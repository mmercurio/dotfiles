# Depending on tmux/termcap version and distribution TERM variable
# for shells running within tmux may default to screen (e.g. Ubuntu 22.04).
# Set explicitly to tmux for full terminal capabilites on modern systems.
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Allow Shift+Enter for Claude Code and other TUIs
# But does NOT work with clursor-agent CLI.
set -g extended-keys on
set -g focus-event on
set -as terminal-features "xterm*:extkeys"

set -g mouse on
set -g set-clipboard on
set -g history-limit 50000

# The default timeout is too long and causes missed esc in vi when typing quickly.
# On very slow network connections, may need to increase. If esc is missed when
# typed too quickly, set to a lower value.
set -g escape-time 100

# These are normaly not needed because it's the default when EDITOR is set to vi
set -g mode-keys vi
set -g status-keys vi

# window and pane index start at 1
set -g base-index 1
set -g pane-base-index 1

# using C-a as prefix
set -g prefix C-a
unbind C-b
bind a send-prefix
bind C-a send-prefix

# toggle mouse mode
unbind m
bind m setw mouse

# reload tmux settings
unbind r
bind r \
    source-file ~/.tmux.conf \;\
        display 'Reloaded tmux config'

# keep current directory when splitting
unbind \"
unbind \%
bind -N "Horizonal split"  - split-window -v -c "#{pane_current_path}"
bind -N "Vertical split" | split-window -h -c "#{pane_current_path}"
bind -N "Vertical split" _ split-window -h -c "#{pane_current_path}"

bind enter copy-mode

# Behave like vim for visual copy/yank and paste/put
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind P paste-buffer
# Version-specific config. 😢
%if #{>=:#{version},3.3}
   bind -T copy-mode-vi Y send -X copy-line-and-cancel
%else
   # needed for version older than 3.3
   bind -T copy-mode-vi Y send -X copy-line
%endif


# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# restore C-k to clear line
bind C-k send-keys 'C-k'

# restore C-l to clear screen
bind C-l send-keys 'C-l'

# restore C-\\ to send SIGQUIT
bind C-\\ send-keys 'C-\'

# Fast pane switching using Meta (Alt) vi keys:
#   https://hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf/
# To get this to work properly on the Mac under iTerm2, need to
# configure iTerm, under Profile, Keys to send "+Esc" for Left option (⌥) key:
#   https://superuser.com/a/650900/384322
# bind -n M-h select-pane -L
# bind -n M-l select-pane -R
# bind -n M-k select-pane -U
# bind -n M-j select-pane -D
# The above conflict with my tiling window manager keys
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D
# also Ctrl-Meta:
bind -n C-M-h select-pane -L
bind -n C-M-l select-pane -R
bind -n C-M-k select-pane -U
bind -n C-M-j select-pane -D

set-option -g status-style "bg=color237,fg=color12"
set-option -g status-right "#{cursor_x},#{cursor_y} @#h %H:%M %b %d"

# Regarding update-environment:
# - Update all the typical SSH related variables plus the X Display.
# - Add LC_DESKTOP_HOST to support 1Password over SSH
#   https://github.com/mmercurio/dotfiles
set -g update-environment "SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION DISPLAY LC_DESKTOP_HOST"
